name: Mirror to org

on:
  push:
    branches: [main]

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to mirror
        env:
          MIRROR_PAT: ${{ secrets.MIRROR_PAT }}
          MIRROR_REPO: ${{ secrets.MIRROR_REPO }}
        run: |
          git remote add mirror https://x-access-token:${MIRROR_PAT}@${MIRROR_REPO}
          git push mirror main
